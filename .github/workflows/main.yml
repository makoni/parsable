name: Test

on:
  push:
    branches: [ "master" ]

jobs:
  ubuntu-test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Swift test
        run: swift test

  macos-test:
    name: Test on macOS
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Swift test
        run: swift test
